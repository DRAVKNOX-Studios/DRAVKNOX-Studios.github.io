<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>404 - Floppy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;touch-action:none;font-family:'Segoe UI',system-ui,sans-serif}
#C{display:block;cursor:pointer}

/* ── Screens ── */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:20}
.scr.off{display:none}

/* ── Title ── */
#tScr{background:radial-gradient(ellipse at 50% 60%,#1a1240 0%,#0a0a18 100%)}
.t404{font-size:clamp(11px,1.8vw,14px);letter-spacing:8px;color:rgba(255,190,70,.55);text-transform:uppercase;margin-bottom:6px}
.tMain{font-size:clamp(56px,13vw,108px);font-weight:900;line-height:.9;letter-spacing:-3px;
  background:linear-gradient(140deg,#ff9f43 0%,#ee5a24 40%,#fd79a8 75%,#a29bfe 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(238,90,36,.35))}
.tSub{font-size:clamp(12px,2.2vw,17px);color:rgba(255,255,255,.42);margin:10px 0 22px;font-style:italic;letter-spacing:.5px}
.tDesc{font-size:clamp(11px,1.6vw,13px);color:rgba(255,255,255,.28);text-align:center;line-height:1.8;margin-bottom:30px;max-width:340px}
.btnGo{padding:14px 46px;border-radius:999px;border:none;cursor:pointer;font-size:clamp(14px,2vw,16px);font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,#ff9f43,#ee5a24);color:#fff;
  box-shadow:0 8px 32px rgba(238,90,36,.5),0 2px 0 rgba(255,255,255,.15) inset;
  transition:transform .14s,box-shadow .14s}
.btnGo:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 14px 40px rgba(238,90,36,.65)}
.btnGo:active{transform:scale(.97)}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;pointer-events:none;z-index:15}
.chip{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 16px;color:#fff;font-size:clamp(10px,1.5vw,13px);font-weight:700;letter-spacing:.5px}
#tapHint{position:fixed;bottom:clamp(55px,9vh,90px);left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.75);font-size:clamp(12px,1.9vw,15px);font-weight:700;letter-spacing:.5px;
  text-shadow:0 2px 10px rgba(0,0,0,.6);animation:hb 1.1s ease-in-out infinite;pointer-events:none;z-index:15;display:none}
@keyframes hb{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}

/* ── Retry card ── */
#rCard{background:rgba(8,6,22,.96);backdrop-filter:blur(24px);border:1.5px solid rgba(255,255,255,.1);border-radius:28px;
  padding:clamp(22px,4.5vw,46px) clamp(26px,6vw,68px);text-align:center;max-width:min(88vw,490px);
  box-shadow:0 40px 100px rgba(0,0,0,.75);animation:cardPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{from{transform:scale(.55) translateY(30px);opacity:0}to{transform:none;opacity:1}}
.rEmoji{font-size:clamp(38px,8vw,60px);display:block;margin-bottom:6px}
.rTitle{font-size:clamp(22px,5vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:10px;
  background:linear-gradient(135deg,#fd79a8,#ee5a24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rBody{font-size:clamp(11px,1.7vw,14px);color:rgba(255,255,255,.58);line-height:1.75;margin-bottom:22px;white-space:pre-line}
.btnRetry{padding:12px 38px;border-radius:999px;border:none;cursor:pointer;font-size:clamp(13px,1.8vw,15px);font-weight:800;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;
  box-shadow:0 8px 26px rgba(108,92,231,.45);transition:transform .14s,box-shadow .14s;pointer-events:auto}
.btnRetry:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 34px rgba(108,92,231,.6)}
.btnRetry:active{transform:scale(.97)}

/* ── Speech bubble ── */
.bub{position:fixed;background:#fff;border-radius:14px;border:2.5px solid #1a1a2e;
  padding:7px 13px;font-size:clamp(11px,1.6vw,14px);font-weight:800;color:#1a1a2e;
  max-width:175px;line-height:1.4;pointer-events:none;z-index:25;
  box-shadow:3px 3px 0 rgba(0,0,0,.22);animation:bpop .22s cubic-bezier(.34,1.56,.64,1)}
.bub::after{content:'';position:absolute;bottom:-11px;left:13px;border:6px solid transparent;border-top-color:#1a1a2e}
.bub.r::after{left:auto;right:13px}
.bub.up::after{bottom:auto;top:-11px;border-top-color:transparent;border-bottom-color:#1a1a2e}
.bub.hide{display:none}
@keyframes bpop{from{transform:scale(.35);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Wasted ── */
#wasted{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,0,0,0);z-index:30;pointer-events:none;transition:background .35s}
#wasted.on{display:flex}
.wTxt{font-size:clamp(52px,13vw,108px);font-weight:900;color:#e74c3c;letter-spacing:5px;
  text-shadow:0 0 50px rgba(231,76,60,.9),5px 5px 0 #5c0a0a;
  animation:wSlam .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes wSlam{from{transform:scaleX(3.5) scaleY(.25);opacity:0}to{transform:none;opacity:1}}
.wSub{font-size:clamp(13px,2.4vw,20px);color:rgba(255,160,160,.9);margin-top:12px;font-style:italic;
  text-shadow:2px 2px 0 #5c0a0a;animation:wFade .45s .3s both}
@keyframes wFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── Dream ── */
#dream{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(80,40,200,0);transition:background .9s;z-index:28;pointer-events:none}
#dream.on{display:flex}
.dTxt{font-size:clamp(22px,5vw,46px);font-weight:900;color:#fff;letter-spacing:8px;
  text-shadow:0 0 50px rgba(180,140,255,1),0 0 100px rgba(180,140,255,.5);
  animation:dPulse 2.5s ease-in-out forwards}
@keyframes dPulse{0%{opacity:0;letter-spacing:22px}35%{opacity:1;letter-spacing:7px}80%{opacity:1}100%{opacity:0;letter-spacing:7px}}
</style>
</head>
<body>
<script>
// DOTFILE SERVING: Serve .well-known files directly
const pathTokens = window.location.pathname.split('/').filter(Boolean);
if (pathTokens[0] === '.well-known') {
  // Serve the file from the root/.well-known/ directory
  const fileName = pathTokens.slice(1).join('/');
  fetch(`/.well-known/${fileName}`)
    .then(res => {
      // If the file exists, return its content
      if (res.ok) {
        res.text().then(text => {
          document.open();
          document.write(text);
          document.close();
        });
      } else {
        // Otherwise show 404 Floppy Bird
        showFloppyBird();
      }
    })
    .catch(() => showFloppyBird());
} else {
  showFloppyBird();
}

function showFloppyBird() {
  // Continue with the normal 404 page
  document.body.style.display = 'block';
}
</script>
<canvas id="C"></canvas>

<!-- Title -->
<div class="scr" id="tScr">
  <div class="t404">404 - PAGE NOT FOUND</div>
  <div class="tMain">FLOPPY BIRD</div>
  <div class="tSub">A Tragedy in Infinite Acts</div>
  <div class="tDesc">The food bowl is right there on the balcony.<br>It is completely unreachable.<br><em style="color:rgba(255,170,60,.6)">This is not a skill issue. It is a universe issue.</em></div>
  <button class="btnGo" id="btnGo">🐦 Fly, Floppy, Fly</button>
</div>

<!-- HUD (shown during play) -->
<div id="hud" style="display:none">
  <div class="chip" id="attChip">Attempt #1</div>
  <div class="chip" style="opacity:.45">🍗 0 / ∞</div>
</div>
<div id="tapHint">👆 Tap / Space to flap!</div>

<!-- Speech bubbles -->
<div class="bub hide" id="bub0"></div><!-- Floppy -->
<div class="bub hide" id="bub1"></div><!-- Strange / other -->

<!-- Retry screen -->
<div class="scr off" id="rScr">
  <div id="rCard">
    <span class="rEmoji" id="rEmoji">💀</span>
    <div class="rTitle" id="rTitle">FAIL</div>
    <div class="rBody" id="rBody"></div>
    <button class="btnRetry" id="btnRetry">Try Again 🐦</button>
  </div>
</div>

<!-- Wasted overlay -->
<div id="wasted"><div class="wTxt">WASTED</div><div class="wSub" id="wSub"></div></div>

<!-- Dream overlay -->
<div id="dream"><div class="dTxt">💤 it was all a dream 💤</div></div>
