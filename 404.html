<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>404 - Floppy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;touch-action:none;font-family:'Segoe UI',system-ui,sans-serif}
#C{display:block;cursor:pointer}

/* ── Screens ── */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:20}
.scr.off{display:none}

/* ── Title ── */
#tScr{background:radial-gradient(ellipse at 50% 60%,#1a1240 0%,#0a0a18 100%)}
.t404{font-size:clamp(11px,1.8vw,14px);letter-spacing:8px;color:rgba(255,190,70,.55);text-transform:uppercase;margin-bottom:6px}
.tMain{font-size:clamp(56px,13vw,108px);font-weight:900;line-height:.9;letter-spacing:-3px;
  background:linear-gradient(140deg,#ff9f43 0%,#ee5a24 40%,#fd79a8 75%,#a29bfe 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(238,90,36,.35))}
.tSub{font-size:clamp(12px,2.2vw,17px);color:rgba(255,255,255,.42);margin:10px 0 22px;font-style:italic;letter-spacing:.5px}
.tDesc{font-size:clamp(11px,1.6vw,13px);color:rgba(255,255,255,.28);text-align:center;line-height:1.8;margin-bottom:30px;max-width:340px}
.btnGo{padding:14px 46px;border-radius:999px;border:none;cursor:pointer;font-size:clamp(14px,2vw,16px);font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,#ff9f43,#ee5a24);color:#fff;
  box-shadow:0 8px 32px rgba(238,90,36,.5),0 2px 0 rgba(255,255,255,.15) inset;
  transition:transform .14s,box-shadow .14s}
.btnGo:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 14px 40px rgba(238,90,36,.65)}
.btnGo:active{transform:scale(.97)}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;pointer-events:none;z-index:15}
.chip{background:rgba(0,0,0,.45);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 16px;color:#fff;font-size:clamp(10px,1.5vw,13px);font-weight:700;letter-spacing:.5px}
#tapHint{position:fixed;bottom:clamp(55px,9vh,90px);left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.75);font-size:clamp(12px,1.9vw,15px);font-weight:700;letter-spacing:.5px;
  text-shadow:0 2px 10px rgba(0,0,0,.6);animation:hb 1.1s ease-in-out infinite;pointer-events:none;z-index:15;display:none}
@keyframes hb{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-7px)}}

/* ── Retry card ── */
#rCard{background:rgba(8,6,22,.96);backdrop-filter:blur(24px);border:1.5px solid rgba(255,255,255,.1);border-radius:28px;
  padding:clamp(22px,4.5vw,46px) clamp(26px,6vw,68px);text-align:center;max-width:min(88vw,490px);
  box-shadow:0 40px 100px rgba(0,0,0,.75);animation:cardPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{from{transform:scale(.55) translateY(30px);opacity:0}to{transform:none;opacity:1}}
.rEmoji{font-size:clamp(38px,8vw,60px);display:block;margin-bottom:6px}
.rTitle{font-size:clamp(22px,5vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:10px;
  background:linear-gradient(135deg,#fd79a8,#ee5a24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rBody{font-size:clamp(11px,1.7vw,14px);color:rgba(255,255,255,.58);line-height:1.75;margin-bottom:22px;white-space:pre-line}
.btnRetry{padding:12px 38px;border-radius:999px;border:none;cursor:pointer;font-size:clamp(13px,1.8vw,15px);font-weight:800;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;
  box-shadow:0 8px 26px rgba(108,92,231,.45);transition:transform .14s,box-shadow .14s;pointer-events:auto}
.btnRetry:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 34px rgba(108,92,231,.6)}
.btnRetry:active{transform:scale(.97)}

/* ── Speech bubble ── */
.bub{position:fixed;background:#fff;border-radius:14px;border:2.5px solid #1a1a2e;
  padding:7px 13px;font-size:clamp(11px,1.6vw,14px);font-weight:800;color:#1a1a2e;
  max-width:175px;line-height:1.4;pointer-events:none;z-index:25;
  box-shadow:3px 3px 0 rgba(0,0,0,.22);animation:bpop .22s cubic-bezier(.34,1.56,.64,1)}
.bub::after{content:'';position:absolute;bottom:-11px;left:13px;border:6px solid transparent;border-top-color:#1a1a2e}
.bub.r::after{left:auto;right:13px}
.bub.up::after{bottom:auto;top:-11px;border-top-color:transparent;border-bottom-color:#1a1a2e}
.bub.hide{display:none}
@keyframes bpop{from{transform:scale(.35);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Wasted ── */
#wasted{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,0,0,0);z-index:30;pointer-events:none;transition:background .35s}
#wasted.on{display:flex}
.wTxt{font-size:clamp(52px,13vw,108px);font-weight:900;color:#e74c3c;letter-spacing:5px;
  text-shadow:0 0 50px rgba(231,76,60,.9),5px 5px 0 #5c0a0a;
  animation:wSlam .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes wSlam{from{transform:scaleX(3.5) scaleY(.25);opacity:0}to{transform:none;opacity:1}}
.wSub{font-size:clamp(13px,2.4vw,20px);color:rgba(255,160,160,.9);margin-top:12px;font-style:italic;
  text-shadow:2px 2px 0 #5c0a0a;animation:wFade .45s .3s both}
@keyframes wFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── Dream ── */
#dream{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(80,40,200,0);transition:background .9s;z-index:28;pointer-events:none}
#dream.on{display:flex}
.dTxt{font-size:clamp(22px,5vw,46px);font-weight:900;color:#fff;letter-spacing:8px;
  text-shadow:0 0 50px rgba(180,140,255,1),0 0 100px rgba(180,140,255,.5);
  animation:dPulse 2.5s ease-in-out forwards}
@keyframes dPulse{0%{opacity:0;letter-spacing:22px}35%{opacity:1;letter-spacing:7px}80%{opacity:1}100%{opacity:0;letter-spacing:7px}}
</style>
</head>
<body>
<canvas id="C"></canvas>

<!-- Title -->
<div class="scr" id="tScr">
  <div class="t404">404 - PAGE NOT FOUND</div>
  <div class="tMain">FLOPPY BIRD</div>
  <div class="tSub">A Tragedy in Infinite Acts</div>
  <div class="tDesc">The food bowl is right there on the balcony.<br>It is completely unreachable.<br><em style="color:rgba(255,170,60,.6)">This is not a skill issue. It is a universe issue.</em></div>
  <button class="btnGo" id="btnGo">🐦 Fly, Floppy, Fly</button>
</div>

<!-- HUD (shown during play) -->
<div id="hud" style="display:none">
  <div class="chip" id="attChip">Attempt #1</div>
  <div class="chip" style="opacity:.45">🍗 0 / ∞</div>
</div>
<div id="tapHint">👆 Tap / Space to flap!</div>

<!-- Speech bubbles -->
<div class="bub hide" id="bub0"></div><!-- Floppy -->
<div class="bub hide" id="bub1"></div><!-- Strange / other -->

<!-- Retry screen -->
<div class="scr off" id="rScr">
  <div id="rCard">
    <span class="rEmoji" id="rEmoji">💀</span>
    <div class="rTitle" id="rTitle">FAIL</div>
    <div class="rBody" id="rBody"></div>
    <button class="btnRetry" id="btnRetry">Try Again 🐦</button>
  </div>
</div>

<!-- Wasted overlay -->
<div id="wasted"><div class="wTxt">WASTED</div><div class="wSub" id="wSub"></div></div>

<!-- Dream overlay -->
<div id="dream"><div class="dTxt">💤 it was all a dream 💤</div></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  FLOPPY BIRD 404  — full procedural canvas  (v2 — show don't tell)
// ═══════════════════════════════════════════════════════════════════
const CV = document.getElementById('C');
const cx = CV.getContext('2d');
let W, H;
function rsz(){ W = CV.width = innerWidth; H = CV.height = innerHeight; }
rsz(); addEventListener('resize', rsz);

// ── utils ──────────────────────────────────────────────────────────
const rnd = (a,b) => a + Math.random()*(b-a);
const pick = a => a[Math.floor(Math.random()*a.length)];
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));
const eio = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;
function hexRGB(h){ return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) }; }
function rgb2h(r,g,b){ return '#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join(''); }
function lighten(h,a){ try{ const {r,g,b}=hexRGB(h); return rgb2h(r+a,g+a,b+a); }catch{ return h; } }
function darken(h,a){ try{ const {r,g,b}=hexRGB(h); return rgb2h(r-a,g-a,b-a); }catch{ return h; } }
function rrect(x,y,w,h,r){
  cx.beginPath(); cx.moveTo(x+r,y);
  cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r); cx.closePath();
}

// ── game state ─────────────────────────────────────────────────────
let gs = 'title';   // title | playing | scripted | retry
let attempts = 0, tick = 0, raf;
let sc = {};        // scene
let qualityTier = 'high', frameMsAvg = 16;
let failScene = null;
const DEBUG_END_CARD = false;
let lastFrameTs = performance.now();
let shakeT = 0, shakeAmp = 0;
function addShake(t=18,a=8){ shakeT=Math.max(shakeT,t); shakeAmp=Math.max(shakeAmp,a); }
let slowMoT = 0, slowMoF = 1;
function startSlowMo(ms=550, factor=.38){
  slowMoT = Math.max(slowMoT, ms);
  slowMoF = Math.min(slowMoF, factor);
}
let camX = 0, camY = 0, camZ = 1;
let camTX = 0, camTY = 0, camTZ = 1, camTimer = 0;
let cineBar = 0, cineBarT = 0, cineFade = 0, cineFadeT = 0;
function focusCam(x, y, z=1.12, ms=900){
  const limX = Math.max(0, (W*(z-1))*0.42);
  const limY = Math.max(0, (H*(z-1))*0.42);
  camTX = clamp(W*.5 - x, -limX, limX);
  camTY = clamp(H*.45 - y, -limY, limY);
  camTZ = clamp(z, 1, 1.45);
  camTimer = Math.max(camTimer, ms);
}
function shotPreset(id){
  cineBarT = clamp(H*.065, 18, 52);
  cineFadeT = .16;
  if(id==='floor'){ focusCam(sc.bird.x, sc.groundY-70, 1.14, 820); startSlowMo(520,.46); }
  else if(id==='bowl'){ focusCam(sc.bowlX, sc.bowlY-20, 1.18, 980); startSlowMo(640,.38); }
  else if(id==='dog'){ focusCam(sc.bird.x+W*.08, sc.bird.y, 1.2, 1100); startSlowMo(780,.38); }
  else if(id==='wasted'){ focusCam(sc.bird.x, sc.bird.y, 1.1, 900); startSlowMo(700,.46); }
  else if(id==='dream'){ focusCam(sc.bowlX, sc.bowlY-30, 1.16, 1000); startSlowMo(700,.42); }
  else if(id==='almost'){ focusCam(sc.bowlX-sc.bowlR*2, sc.bowlY, 1.2, 1100); startSlowMo(760,.36); }
  else if(id==='portal'){ focusCam(sc.portalX||sc.bowlX, (sc.portalY||sc.bowlY)-20, 1.28, 1300); startSlowMo(1000,.32); }
  else if(id==='strange'){ focusCam(sc.bsX||W*.62, sc.bsY||H*.44, 1.2, 1300); startSlowMo(720,.42); }
  else if(id==='generic'){ focusCam(sc.bird.x, sc.bird.y, 1.12, 760); startSlowMo(520,.48); }
}
function setShotPreset(name){ shotPreset(name); }
function focusTarget(target, opts={}){
  focusCam(target.x, target.y, opts.zoom ?? 1.18, opts.ms ?? 900);
}
function resetCinematicState(){
  camX=0; camY=0; camZ=1; camTX=0; camTY=0; camTZ=1; camTimer=0;
  slowMoT=0; slowMoF=1; shakeT=0; shakeAmp=0;
  cineBar=0; cineBarT=0; cineFade=0; cineFadeT=0;
}
function finishFailScene(){
  failScene = null;
  attempts++;
  document.getElementById('attChip').textContent=`Attempt #${attempts+1}`;
  hideBub(0); hideBub(1);
  document.getElementById('wasted').classList.remove('on');
  document.getElementById('dream').classList.remove('on');
  startRound();
}
function startFailScene(failType){
  failScene = { type: failType, t: 0, phase: 0 };
  gs='scripted';
  const map = {
    floor:doFloorFail,bowl_falls:doBowlFalls,duck_hunt:doDuckHunt,wasted:doWasted,dream:doDream,
    almost_falls:doAlmostFalls,portal_butt:doPortalButt,birdy_strange:doBirdyStrange,
    invisible_wall:doInvisibleWall,wind_gust:doWindGust,plane_crash:doPlaneCrash,
    too_slow:doTooSlow,connection_lost:doConnectionLost,low_battery:doLowBattery,broken_physics:doBrokenPhysics
  };
  if(map[failType]) map[failType]();
}

// ── fail queue ─────────────────────────────────────────────────────
const SPEC = ['bowl_falls','duck_hunt','wasted','dream','almost_falls','portal_butt','birdy_strange'];
const GEN  = [
  {e:'💨',t:'TOO SLOW',b:'The bowl is gone.'},
  {e:'📡',t:'CONNECTION LOST',b:'Signal failed.'},
  {e:'🐱',t:'CAT STARE',b:'Predator eye contact.'},
  {e:'💤',t:'MID-AIR NAP',b:'He slept.'},
  {e:'⏳',t:'SKILL ISSUE',b:'Catastrophic timing.'},
  {e:'✈️',t:'PLANE CRASH',b:'Air traffic was not clear.'},
  {e:'🔋',t:'LOW BATTERY',b:'Floppy is empty.'},
  {e:'🪃',t:'BROKEN PHYSICS',b:'The world said no.'},
  {e:'🧱',t:'INVISIBLE WALL',b:'Unseen impact.'},
  {e:'🌪️',t:'WIND GUST',b:'A sudden gust hit.'},
];
let fQueue = [];
function buildQ(){
  fQueue = [...SPEC].sort(()=>Math.random()-.5);
  const g = [...GEN].sort(()=>Math.random()-.5);
  fQueue = [...fQueue, ...g, ...[...SPEC].sort(()=>Math.random()-.5), ...g];
}
buildQ();
const nextFail = () => fQueue[attempts % fQueue.length];

// ── sky palettes (each attempt = different sky) ────────────────────
const SKIES = [
  ['#0a0820','#13154a','#223a8f','#5580cc','#9fc4e8'],  // midnight blue
  ['#f97316','#fb923c','#fcd34d','#fef9c3','#dbeafe'],  // sunrise
  ['#0f172a','#1e1b4b','#4338ca','#818cf8','#e0e7ff'],  // indigo night
  ['#064e3b','#065f46','#059669','#6ee7b7','#d1fae5'],  // emerald dawn
  ['#450a0a','#7f1d1d','#dc2626','#f97316','#fef9c3'],  // fiery dusk
  ['#0c4a6e','#0369a1','#38bdf8','#bae6fd','#f0f9ff'],  // sky blue
  ['#1e1b4b','#4c1d95','#7c3aed','#c4b5fd','#ede9fe'],  // violet twilight
  ['#14532d','#15803d','#4ade80','#bbf7d0','#f0fdf4'],  // forest morning
];
const GROUNDS = [
  {d:'#3b1f0e',g:'#166534',gh:'#15803d',s:'#14532d'},
  {d:'#2c1810',g:'#365314',gh:'#4d7c0f',s:'#3f6212'},
  {d:'#1c1917',g:'#1e3a5f',gh:'#1e40af',s:'#1d3461'},
  {d:'#0f172a',g:'#064e3b',gh:'#065f46',s:'#134e4a'},
];
const BCOLORS = [
  {body:'#fbbf24',wing:'#f59e0b',beak:'#ef4444',eye:'#1e293b'},
  {body:'#34d399',wing:'#10b981',beak:'#f59e0b',eye:'#064e3b'},
  {body:'#f472b6',wing:'#ec4899',beak:'#ef4444',eye:'#500724'},
  {body:'#60a5fa',wing:'#3b82f6',beak:'#f59e0b',eye:'#172554'},
  {body:'#fb923c',wing:'#f97316',beak:'#fbbf24',eye:'#431407'},
  {body:'#a78bfa',wing:'#8b5cf6',beak:'#f472b6',eye:'#2e1065'},
  {body:'#fde68a',wing:'#fcd34d',beak:'#f97316',eye:'#713f12'},
];

// ── house colors ───────────────────────────────────────────────────
const HOUSE_THEMES = [
  {wall:'#d4a76a',wall2:'#c8956a',roof:'#c0392b',roof2:'#96281b',trim:'#f5f0e8',win:'#93c5fd',door:'#7c3d0c'},
  {wall:'#e8d5b7',wall2:'#d4b896',roof:'#374151',roof2:'#1f2937',trim:'#ffffff',win:'#fcd34d',door:'#1e293b'},
  {wall:'#fecaca',wall2:'#fca5a5',roof:'#1e3a5f',roof2:'#172554',trim:'#fff7ed',win:'#a5f3fc',door:'#c2410c'},
  {wall:'#bfdbfe',wall2:'#93c5fd',roof:'#15803d',roof2:'#14532d',trim:'#f0f9ff',win:'#fde68a',door:'#14532d'},
];

// ═══ initScene ════════════════════════════════════════════════════
function initScene(){
  const si  = attempts % SKIES.length;
  const gi  = attempts % GROUNDS.length;
  const bi  = attempts % BCOLORS.length;
  const hi  = attempts % HOUSE_THEMES.length;

  const groundY = H * rnd(.68,.75);
  const poleX   = W * rnd(.06,.10);

  // pole top — where bird sits
  const poleTopY = groundY - H * rnd(.26,.36);
  const poleW    = clamp(W*.013,10,20);

  // House on right side — balcony at roughly the same height or slightly above pole
  const houseX   = W * rnd(.78,.84);
  const houseW   = clamp(W*.18,120,260);
  const houseH   = clamp(H*.42,200,380);
  const houseBaseY = groundY;
  const houseTopY  = houseBaseY - houseH;

  // Balcony is on left face of house, at ~65% house height from bottom
  const balconyY = houseBaseY - houseH * rnd(.60,.70);
  // Bowl sits on balcony top railing (not floor slab)
  const bowlR    = clamp(W*.033,18,46);
  const bowlX    = houseX - bowlR * .55;  // outside left edge of house
  const balH     = houseH*.09;
  const railTopY = balconyY - balH*2.5;
  const bowlY    = railTopY + bowlR*.14;

  // sun
  const isMoon = si===0||si===6;
  const sun = {
    x:rnd(W*.15,W*.72), y:rnd(H*.05,H*.2),
    r:rnd(26,50), isMoon,
    color: isMoon ? '#fef9c3' : pick(['#fcd34d','#fbbf24','#f59e0b']),
    rays: Math.floor(rnd(7,13)),
  };

  // clouds
  const clouds=[];
  for(let i=0;i<Math.floor(rnd(4,9));i++){
    const lumps=[]; for(let j=0;j<Math.floor(rnd(3,7));j++) lumps.push({dx:rnd(-38,38),dy:rnd(-15,15),r:rnd(16,46)});
    clouds.push({x:rnd(0,W),y:rnd(H*.04,groundY*.5),lumps,spd:rnd(.1,.42),alpha:rnd(.6,.9),tint:pick(['#fff','#f0f4ff','#fff8f0'])});
  }

  // bg birds
  const bgs=[];
  for(let i=0;i<Math.floor(rnd(3,8));i++) bgs.push({x:rnd(0,W),y:rnd(H*.05,groundY*.45),spd:rnd(.2,.9),ft:rnd(0,6.28),sz:rnd(4,10)});

  // trees (between pole and house)
  const trees=[];
  const tcols=['#166534','#15803d','#14532d','#065f46','#14532d'];
  for(let i=0;i<Math.floor(rnd(1,4));i++){
    const tx=rnd(poleX+W*.12,houseX-W*.04);
    trees.push({x:tx,baseY:groundY,trH:rnd(55,110),trW:rnd(9,17),cr:rnd(28,58),col:pick(tcols),dark:pick(['#14532d','#052e16','#064e3b']),ly:Math.floor(rnd(2,4))});
  }

  // bird
  const bc = BCOLORS[bi];
  const bird={
    x:poleX, y:poleTopY,
    startX:poleX, startY:poleTopY,
    vy:0, angle:0, onPole:true, alive:true,
    size:clamp(W*.038,22,50),
    flapT:0, blinkT:0, blink:false,
    deadAnim:false, deadVX:0, deadVY:0, deadSpin:0, deadFade:1,
    trail:[],
    ...bc,
  };

  // fail routine active state
  sc={
    sky:SKIES[si], gnd:GROUNDS[gi], ht:HOUSE_THEMES[hi],
    groundY, poleX, poleTopY, poleW,
    houseX, houseW, houseH, houseBaseY, houseTopY,
    balconyY, bowlX, bowlY, bowlR,
    bowlWobble:0, bowlVY:0, bowlFalling:false,
    seedCols:[bc.beak, bc.wing, pick(['#fcd34d','#4ade80','#f87171','#60a5fa'])],
    sun, clouds, bgs, trees, bird,
    parts:[],
    // duck hunt state
    dogX:-200, dogVis:false, netVis:false, netCaught:false,
    netThrowing:false, netX:0, netY:0, netVX:0, netVY:0, dogArmUp:false,
    // portal state

// ═══ draw helpers ═════════════════════════════════════════════════
function drawSky(){
  const pal=sc.sky;
  const g=cx.createLinearGradient(0,0,0,sc.groundY);
  pal.forEach((c,i)=>g.addColorStop(i/(pal.length-1),c));
  cx.fillStyle=g; cx.fillRect(0,0,W,sc.groundY);
}

function drawSun(){
  const s=sc.sun;
  cx.save();
  if(s.isMoon){
    const mg=cx.createRadialGradient(s.x,s.y,s.r*.8,s.x,s.y,s.r*2.2);
    mg.addColorStop(0,'rgba(254,249,195,.13)'); mg.addColorStop(1,'transparent');
    cx.fillStyle=mg; cx.beginPath(); cx.arc(s.x,s.y,s.r*2.2,0,Math.PI*2); cx.fill();
    cx.fillStyle=s.color; cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
    cx.fillStyle=sc.sky[1]||'#13154a';
    cx.beginPath(); cx.arc(s.x+s.r*.32,s.y,s.r*.75,0,Math.PI*2); cx.fill();
    [[-.28,-.18,.14],[.12,.08,.09]].forEach(([dx,dy,cr])=>{
      cx.fillStyle='rgba(0,0,0,.1)'; cx.beginPath(); cx.arc(s.x+dx*s.r,s.y+dy*s.r,cr*s.r,0,Math.PI*2); cx.fill();
    });
  } else {
    const gg=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2.8);
    gg.addColorStop(0,'rgba(252,211,77,.16)'); gg.addColorStop(1,'transparent');
    cx.fillStyle=gg; cx.beginPath(); cx.arc(s.x,s.y,s.r*2.8,0,Math.PI*2); cx.fill();
    const rt=tick*.005;
    for(let i=0;i<s.rays;i++){
      const a=(i/s.rays)*Math.PI*2+rt;
      cx.strokeStyle=s.color; cx.lineWidth=2.5; cx.lineCap='round'; cx.globalAlpha=.5;
      cx.beginPath(); cx.moveTo(s.x+Math.cos(a)*(s.r+5),s.y+Math.sin(a)*(s.r+5));
      cx.lineTo(s.x+Math.cos(a)*(s.r+16+Math.sin(tick*.04+i)*5),s.y+Math.sin(a)*(s.r+16+Math.sin(tick*.04+i)*5)); cx.stroke();
    }
    cx.globalAlpha=1;
    const sg=cx.createRadialGradient(s.x-s.r*.3,s.y-s.r*.3,2,s.x,s.y,s.r);
    sg.addColorStop(0,'#fffbeb'); sg.addColorStop(1,s.color);
    cx.fillStyle=sg; cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
  }
  cx.restore();
}

function drawClouds(){
  sc.clouds.forEach(c=>{
    c.x-=c.spd; if(c.x<-130) c.x=W+130;
    cx.save(); cx.globalAlpha=c.alpha; cx.fillStyle=c.tint;
    c.lumps.forEach(l=>{ cx.beginPath(); cx.arc(c.x+l.dx,c.y+l.dy,l.r,0,Math.PI*2); cx.fill(); });
    cx.globalAlpha=c.alpha*.12; cx.fillStyle='#334';
    c.lumps.forEach(l=>{ cx.beginPath(); cx.arc(c.x+l.dx,c.y+l.dy+l.r*.38,l.r*.72,0,Math.PI*2); cx.fill(); });
    cx.restore();
  });
}

function drawBgBirds(){
  sc.bgs.forEach(b=>{
    b.x+=b.spd; b.ft+=.1; if(b.x>W+20) b.x=-20;
    const fl=Math.sin(b.ft)*b.sz*.65;
    cx.strokeStyle='rgba(0,0,0,.2)'; cx.lineWidth=b.sz*.2; cx.lineCap='round';
    cx.beginPath(); cx.moveTo(b.x-b.sz,b.y+fl); cx.quadraticCurveTo(b.x,b.y-fl*.4,b.x+b.sz,b.y+fl); cx.stroke();
  });
}

function drawTrees(){
  sc.trees.forEach(t=>{
    const tg=cx.createLinearGradient(t.x-t.trW/2,0,t.x+t.trW/2,0);
    tg.addColorStop(0,'#3b1f0e'); tg.addColorStop(.5,'#7c4b1e'); tg.addColorStop(1,'#3b1f0e');
    cx.fillStyle=tg; cx.fillRect(t.x-t.trW/2,t.baseY-t.trH,t.trW,t.trH);
    for(let i=0;i<t.ly;i++){
      const ly=t.baseY-t.trH-i*(t.cr*.52), lr=t.cr*(1-i*.2);
      cx.fillStyle=i===0?t.dark:t.col; cx.beginPath(); cx.arc(t.x,ly,lr,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,.06)'; cx.beginPath(); cx.arc(t.x-lr*.22,ly-lr*.22,lr*.42,0,Math.PI*2); cx.fill();
    }
  });
}

function drawGround(){
  const gp=sc.gnd, gY=sc.groundY;
  const dg=cx.createLinearGradient(0,gY,0,H);
  dg.addColorStop(0,gp.d); dg.addColorStop(1,'#150a05');
  cx.fillStyle=dg; cx.fillRect(0,gY,W,H-gY);
  cx.fillStyle=gp.g; cx.fillRect(0,gY-10,W,14);
  cx.fillStyle=gp.gh; cx.fillRect(0,gY-10,W,5);
  cx.fillStyle=gp.s;
  for(let gx=0;gx<W;gx+=13+Math.floor(Math.abs(Math.sin(gx*.8))*5)){
    const ht=5+Math.abs(Math.sin(gx*.28+1.2))*8;
    cx.beginPath(); cx.moveTo(gx,gY-8); cx.quadraticCurveTo(gx+4,gY-8-ht,gx+9,gY-8); cx.fill();
  }
  cx.globalAlpha=.05;
  for(let i=1;i<4;i++){ cx.fillStyle='#fff'; cx.fillRect(0,gY+(H-gY)*i/4,W,2); }
  cx.globalAlpha=1;
}

function drawPole(){
  const px=sc.poleX, topY=sc.poleTopY, baseY=sc.groundY, pw=sc.poleW;
  const pg=cx.createLinearGradient(px-pw,0,px+pw,0);
  pg.addColorStop(0,'rgba(0,0,0,.45)'); pg.addColorStop(.35,sc.gnd.d==='#3b1f0e'?'#8B6914':'#6b5a3e');
  pg.addColorStop(.65,lighten('#8B6914',40)); pg.addColorStop(1,'rgba(0,0,0,.35)');
  cx.fillStyle=pg; rrect(px-pw/2,topY,pw,baseY-topY,pw*.3); cx.fill();
  // cap
  cx.fillStyle='#fbbf24'; rrect(px-pw*.85,topY-pw*.75,pw*1.7,pw*.95,pw*.25); cx.fill();
  cx.fillStyle='rgba(255,255,255,.35)'; cx.fillRect(px-pw*.18,topY,pw*.15,baseY-topY);
}

// ── HOUSE with balcony ──────────────────────────────────────────────
function drawHouse(){
  const ht=sc.ht;
  const hx=sc.houseX, hy=sc.houseBaseY, hw=sc.houseW, hh=sc.houseH;
  const topY=sc.houseTopY;
  const balY=sc.balconyY;

  cx.save();

  // ── Main wall (left face visible — fake isometric) ──
  const wg=cx.createLinearGradient(hx,topY,hx+hw,hy);
  wg.addColorStop(0,lighten(ht.wall,10)); wg.addColorStop(1,darken(ht.wall,20));
  cx.fillStyle=wg; rrect(hx,topY,hw,hh,6); cx.fill();

  // Side face (right shadow face for depth)
  const sDepth=hw*.12;
  cx.fillStyle=darken(ht.wall2,25);
  cx.beginPath();
  cx.moveTo(hx+hw,topY); cx.lineTo(hx+hw+sDepth,topY-sDepth*.7);
  cx.lineTo(hx+hw+sDepth,hy-sDepth*.7); cx.lineTo(hx+hw,hy); cx.closePath(); cx.fill();

  // Top face
  cx.fillStyle=darken(ht.wall,5);
  cx.beginPath();
  cx.moveTo(hx,topY); cx.lineTo(hx+hw,topY);
  cx.lineTo(hx+hw+sDepth,topY-sDepth*.7); cx.lineTo(hx+sDepth,topY-sDepth*.7); cx.closePath(); cx.fill();

  // ── Roof ──
  const roofH = hw * .38;
  const rg=cx.createLinearGradient(hx,topY-roofH,hx,topY);
  rg.addColorStop(0,lighten(ht.roof,15)); rg.addColorStop(1,darken(ht.roof,10));
  cx.fillStyle=rg;
  cx.beginPath();
  cx.moveTo(hx-8,topY); cx.lineTo(hx+hw/2,topY-roofH);
  cx.lineTo(hx+hw+8,topY); cx.closePath(); cx.fill();
  // roof side
  cx.fillStyle=darken(ht.roof2,15);
  cx.beginPath();
  cx.moveTo(hx+hw+8,topY); cx.lineTo(hx+hw/2,topY-roofH);
  cx.lineTo(hx+hw/2+sDepth,topY-roofH-sDepth*.5);
  cx.lineTo(hx+hw+8+sDepth,topY-sDepth*.7); cx.closePath(); cx.fill();
  // roof ridge cap
  cx.fillStyle=ht.trim; cx.lineWidth=3; cx.strokeStyle=darken(ht.roof,25);
  cx.fillRect(hx+hw/2-4,topY-roofH-4,8,roofH+8); cx.stroke();

  // ── Windows ──
  const winW=hw*.22, winH=hw*.26;
  [[hx+hw*.15,topY+hh*.18],[hx+hw*.55,topY+hh*.18],
   [hx+hw*.15,topY+hh*.52],[hx+hw*.55,topY+hh*.52]].forEach(([wx,wy])=>{
    // frame
    cx.fillStyle=ht.trim; rrect(wx-3,wy-3,winW+6,winH+6,4); cx.fill();
    // glass
    const wg2=cx.createLinearGradient(wx,wy,wx+winW,wy+winH);
    wg2.addColorStop(0,lighten(ht.win,30)); wg2.addColorStop(1,ht.win);
    cx.fillStyle=wg2; rrect(wx,wy,winW,winH,3); cx.fill();
    // light
    cx.fillStyle='rgba(255,255,255,.35)'; cx.fillRect(wx+3,wy+3,winW*.35,winH*.35);
    // cross divider
    cx.strokeStyle=ht.trim; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(wx+winW/2,wy); cx.lineTo(wx+winW/2,wy+winH); cx.stroke();
    cx.beginPath(); cx.moveTo(wx,wy+winH/2); cx.lineTo(wx+winW,wy+winH/2); cx.stroke();
  });

  // ── Door ──
  const dW=hw*.22, dH=hh*.28, dX=hx+hw*.38, dY=hy-dH;
  cx.fillStyle=ht.trim; rrect(dX-3,dY-3,dW+6,dH+6,5); cx.fill();
  const dg2=cx.createLinearGradient(dX,dY,dX+dW,dY+dH);
  dg2.addColorStop(0,lighten(ht.door,20)); dg2.addColorStop(1,ht.door);
  cx.fillStyle=dg2; rrect(dX,dY,dW,dH,4); cx.fill();
  // door arch
  cx.fillStyle=lighten(ht.door,30); cx.beginPath(); cx.arc(dX+dW/2,dY,dW/2,Math.PI,0); cx.fill();
  // door knob
  cx.fillStyle='#fbbf24'; cx.beginPath(); cx.arc(dX+dW*.72,dY+dH*.55,4,0,Math.PI*2); cx.fill();

  // ── BALCONY ──
  const balH = hh*.09; // height of balcony floor slab
  const balW = hw*.38;
  const balLeft = hx - balW; // extends LEFT of house
  const balFloorY = balY;

  // Balcony floor slab (3D)
  cx.fillStyle=lighten(ht.wall,8);
  cx.fillRect(balLeft, balFloorY, balW+4, balH);
  // slab underside
  cx.fillStyle=darken(ht.wall,20);
  cx.fillRect(balLeft, balFloorY+balH, balW+4, balH*.35);
  // slab top
  cx.fillStyle=lighten(ht.trim,5);
  cx.fillRect(balLeft-2, balFloorY-4, balW+8, 5);

  // Balcony railing posts
  cx.strokeStyle=ht.trim; cx.lineWidth=3; cx.lineCap='round';
  const nPosts=6;
  for(let i=0;i<=nPosts;i++){
    const px2=balLeft+i*(balW/nPosts);
    cx.beginPath(); cx.moveTo(px2,balFloorY); cx.lineTo(px2,balFloorY-balH*2.5); cx.stroke();
  }
  // top rail
  cx.lineWidth=5;
  cx.beginPath(); cx.moveTo(balLeft-3,balFloorY-balH*2.5); cx.lineTo(balLeft+balW+5,balFloorY-balH*2.5); cx.stroke();
  // bottom rail
  cx.lineWidth=2.5;
  cx.beginPath(); cx.moveTo(balLeft-3,balFloorY-balH*1.2); cx.lineTo(balLeft+balW+5,balFloorY-balH*1.2); cx.stroke();

  // ── A potted plant on balcony (procedural) ──
  const plantX=balLeft+balW*.65, plantY=balFloorY;
  cx.fillStyle=darken(ht.door,10); cx.fillRect(plantX-8,plantY-22,16,22);
  cx.fillStyle='#166534'; cx.beginPath(); cx.arc(plantX,plantY-28,16,0,Math.PI*2); cx.fill();
  cx.fillStyle='#14532d'; cx.beginPath(); cx.arc(plantX-6,plantY-24,10,0,Math.PI*2); cx.fill();
  cx.fillStyle='#15803d'; cx.beginPath(); cx.arc(plantX+4,plantY-26,9,0,Math.PI*2); cx.fill();

  cx.restore();
}

// ── bowl ───────────────────────────────────────────────────────────
function drawBowl(bx, by, br, seedC, wobble){
  const off = Math.sin(tick*.07)*wobble;
  by += off;
  cx.save();
  // shadow on balcony
  cx.globalAlpha=.18; cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(bx,by+br*.12,br*1.3,br*.26,0,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;
  // body (deeper ceramic bowl)
  const bg=cx.createRadialGradient(bx-br*.35,by-br*.35,br*.04,bx,by,br*1.15);
  bg.addColorStop(0,'#f8fafc'); bg.addColorStop(.45,'#dbe4ee'); bg.addColorStop(1,'#64748b');
  cx.fillStyle=bg; cx.beginPath(); cx.arc(bx,by,br,Math.PI,0); cx.closePath(); cx.fill();
  // rim
  const rg=cx.createLinearGradient(bx-br,by,bx+br,by);
  rg.addColorStop(0,'#9ca3af'); rg.addColorStop(.5,'#f9fafb'); rg.addColorStop(1,'#9ca3af');
  cx.fillStyle=rg; cx.beginPath(); cx.ellipse(bx,by,br,br*.2,0,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#6b7280'; cx.lineWidth=1.5;
  cx.beginPath(); cx.ellipse(bx,by,br,br*.2,0,0,Math.PI*2); cx.stroke();
  // highlight
  cx.fillStyle='rgba(255,255,255,.55)';
  cx.beginPath(); cx.ellipse(bx-br*.2,by-br*.06,br*.32,br*.07,0,0,Math.PI*2); cx.fill();
  // food mound
  const fg=cx.createRadialGradient(bx,by-br*.08,br*.04,bx,by,br*.9);
  fg.addColorStop(0,'#fde68a'); fg.addColorStop(1,'#ca8a04');
  cx.fillStyle=fg; cx.beginPath(); cx.ellipse(bx,by-br*.03,br*.72,br*.24,0,0,Math.PI*2); cx.fill();
  // seeds and bits
  [{dx:-.32,dy:.06,rx:.11,ry:.08},{dx:.28,dy:.07,rx:.09,ry:.07},{dx:.02,dy:.04,rx:.1,ry:.07},
   {dx:-.14,dy:.12,rx:.09,ry:.06},{dx:.18,dy:.03,rx:.09,ry:.06},{dx:-.02,dy:.14,rx:.08,ry:.06}]
  .forEach((s,i)=>{
    cx.fillStyle=seedC[i%seedC.length];
    cx.beginPath(); cx.ellipse(bx+s.dx*br,by+s.dy*br,s.rx*br,s.ry*br,Math.random()*.8,0,Math.PI*2); cx.fill();
    cx.strokeStyle='rgba(0,0,0,.12)'; cx.lineWidth=.8;
    cx.beginPath(); cx.ellipse(bx+s.dx*br,by+s.dy*br,s.rx*br,s.ry*br,0,0,Math.PI*2); cx.stroke();
  });
  [['#ef4444',-.22,.02,.06,.05],['#22c55e',.16,.01,.05,.04],['#f97316',.03,-.01,.06,.05]].forEach(f=>{
    cx.fillStyle=f[0];
    cx.beginPath(); cx.ellipse(bx+f[1]*br,by+f[2]*br,f[3]*br,f[4]*br,0,0,Math.PI*2); cx.fill();
  });
  cx.restore();
}

// ── bird ───────────────────────────────────────────────────────────
function drawBird(bird, ox, oy, oa){
  const bx=ox!==undefined?ox:bird.x, by=oy!==undefined?oy:bird.y, ang=oa!==undefined?oa:bird.angle;
  const s=bird.size;
  cx.save(); cx.translate(bx,by); cx.rotate(ang);

  if(!bird.onPole){
    cx.save(); cx.globalAlpha=.1; cx.fillStyle='#000';
    cx.beginPath(); cx.ellipse(0,s*.5,s*.52,s*.14,0,0,Math.PI*2); cx.fill(); cx.restore();
  }
  // tail
  cx.fillStyle=bird.wing;
  [[[-s*.55,-s*.07],[-s*.88,-s*.25],[-s*.78,s*.2]],
   [[-s*.55,s*.06],[-s*.82,s*.09],[-s*.72,s*.3]]].forEach(pts=>{
    cx.beginPath(); cx.moveTo(...pts[0]); cx.lineTo(...pts[1]); cx.lineTo(...pts[2]); cx.closePath(); cx.fill();
  });
  // wing
  const wA=bird.onPole?Math.sin(tick*.04)*.14:Math.sin(bird.flapT*.22)*.65;
  cx.save(); cx.translate(-s*.05,-s*.08); cx.rotate(wA);
  cx.fillStyle=bird.wing; cx.beginPath(); cx.ellipse(0,s*.2,s*.32,s*.15,.3,0,Math.PI*2); cx.fill();
  cx.restore();
  // body
  const bg=cx.createRadialGradient(-s*.18,-s*.18,s*.04,0,0,s*.58);
  bg.addColorStop(0,lighten(bird.body,55)); bg.addColorStop(.5,bird.body); bg.addColorStop(1,darken(bird.body,35));
  cx.fillStyle=bg; cx.beginPath(); cx.ellipse(0,0,s*.52,s*.43,0,0,Math.PI*2); cx.fill();
  cx.strokeStyle='rgba(0,0,0,.1)'; cx.lineWidth=1;
  cx.beginPath(); cx.ellipse(0,0,s*.52,s*.43,0,0,Math.PI*2); cx.stroke();
  // belly
  cx.fillStyle='rgba(255,255,255,.22)'; cx.beginPath(); cx.ellipse(s*.1,s*.1,s*.28,s*.21,0,0,Math.PI*2); cx.fill();
  // eye
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(s*.22,-s*.1,s*.18,0,Math.PI*2); cx.fill();
  if(bird.blink){
    cx.strokeStyle=bird.eye; cx.lineWidth=s*.06; cx.lineCap='round';
    cx.beginPath(); cx.moveTo(s*.07,-s*.1); cx.lineTo(s*.37,-s*.1); cx.stroke();
  } else {
    cx.fillStyle=bird.eye; cx.beginPath(); cx.arc(s*.27,-s*.1,s*.1,0,Math.PI*2); cx.fill();
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(s*.3,-s*.14,s*.04,0,Math.PI*2); cx.fill();
  }
  // beak
  cx.fillStyle=bird.beak;
  cx.beginPath(); cx.moveTo(s*.38,-s*.05); cx.lineTo(s*.76,s*.02); cx.lineTo(s*.38,s*.08); cx.closePath(); cx.fill();
  cx.fillStyle=darken(bird.beak,18);
  cx.beginPath(); cx.moveTo(s*.38,s*.03); cx.lineTo(s*.72,s*.06); cx.lineTo(s*.38,s*.13); cx.closePath(); cx.fill();
  // feet on pole
  if(bird.onPole){
    cx.strokeStyle=bird.beak; cx.lineWidth=s*.08; cx.lineCap='round';
    [[-s*.2,s*.42],[s*.08,s*.42]].forEach(([fx,fy])=>{
      cx.beginPath(); cx.moveTo(fx,fy); cx.lineTo(fx,fy+s*.22);
      cx.moveTo(fx-s*.15,fy+s*.24); cx.lineTo(fx,fy+s*.22); cx.lineTo(fx+s*.15,fy+s*.24); cx.stroke();
    });
  }
  cx.restore();
}

// ── Birdy Strange (drawn inline on main canvas) ────────────────────
function drawBirdyStrange(bsx, bsy, bss, finger){
  const s=bss;
  cx.save(); cx.translate(bsx,bsy);

  // portal glow behind him
  cx.save(); cx.globalAlpha=.35;
  const pg=cx.createRadialGradient(0,0,s*.3,0,0,s*1.8);
  pg.addColorStop(0,'rgba(139,92,246,.7)'); pg.addColorStop(1,'transparent');
  cx.fillStyle=pg; cx.beginPath(); cx.arc(0,0,s*1.8,0,Math.PI*2); cx.fill();
  cx.restore();

  // cloak
  cx.fillStyle='#7f1d1d';
  cx.beginPath(); cx.moveTo(-s*.55,-s*.1); cx.lineTo(-s*.8,s*.95); cx.lineTo(s*.8,s*.95); cx.lineTo(s*.55,-s*.1); cx.closePath(); cx.fill();
  cx.fillStyle='#450a0a';
  cx.beginPath(); cx.moveTo(-s*.4,.0); cx.lineTo(-s*.52,s*.93); cx.lineTo(s*.52,s*.93); cx.lineTo(s*.4,0); cx.closePath(); cx.fill();
  // gold trim collar
  cx.fillStyle='#fbbf24';
  cx.beginPath();
  cx.moveTo(-s*.55,-s*.1); cx.lineTo(-s*.4,-s*.22); cx.lineTo(0,s*.04); cx.lineTo(s*.4,-s*.22); cx.lineTo(s*.55,-s*.1);
  cx.lineTo(s*.32,s*.04); cx.lineTo(0,-s*.08); cx.lineTo(-s*.32,s*.04); cx.closePath(); cx.fill();

  // tunic body
  const bg=cx.createRadialGradient(-s*.16,-s*.16,s*.02,0,0,s*.52);
  bg.addColorStop(0,'#3b82f6'); bg.addColorStop(1,'#1e3a8a');
  cx.fillStyle=bg; cx.beginPath(); cx.ellipse(0,0,s*.5,s*.43,0,0,Math.PI*2); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.1)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.ellipse(0,0,s*.5,s*.43,0,0,Math.PI*2); cx.stroke();

  // Eye of Agamotto
  cx.fillStyle='#a7f3d0'; cx.beginPath(); cx.ellipse(0,s*.08,s*.14,s*.1,0,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#fbbf24'; cx.lineWidth=1.5;
  cx.beginPath(); cx.ellipse(0,s*.08,s*.14,s*.1,0,0,Math.PI*2); cx.stroke();

      cx.beginPath(); cx.moveTo(s*.5,-s*.32); cx.lineTo(s*1.22,-s*1.28); cx.stroke();
    }
    cx.strokeStyle='#666'; cx.lineWidth=3;
    cx.beginPath(); cx.ellipse(nx,ny,s*.54,s*.54,0,0,Math.PI*2); cx.stroke();
    cx.strokeStyle='rgba(80,80,80,.5)'; cx.lineWidth=1;

    if(sc.netCaught){
      cx.save(); cx.translate(nx,ny); cx.scale(.52,.52); cx.rotate(.45);
      drawBird(sc.bird,0,0,1.4); cx.restore();
    }

  cx.restore();
}

// ── particles ──────────────────────────────────────────────────────
function spawnP(x,y,n,cols){
  const qn = qualityTier==='low' ? Math.max(4,Math.floor(n*.4)) : qualityTier==='medium' ? Math.max(6,Math.floor(n*.7)) : n;
  for(let i=0;i<qn;i++){
    const a=Math.random()*Math.PI*2, sp=rnd(.5,5.5);
    sc.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rnd(1,4),life:1,dec:rnd(.012,.03),r:rnd(3,11),col:pick(cols)});
  }
}
function drawParts(){
  sc.parts=sc.parts.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=p.dec;
    if(p.life<=0) return false;
    cx.save(); cx.globalAlpha=p.life; cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill(); cx.restore();
    return true;
  });
}

function drawTrail(){
  if(!sc.bird.onPole&&sc.bird.alive) sc.bird.trail.push({x:sc.bird.x,y:sc.bird.y,life:1});
  sc.bird.trail=sc.bird.trail.filter(t=>{
    t.life-=.055; if(t.life<=0) return false;
    cx.save(); cx.globalAlpha=t.life*.3; cx.fillStyle=sc.bird.body;
    cx.beginPath(); cx.arc(t.x,t.y,sc.bird.size*.2,0,Math.PI*2); cx.fill(); cx.restore();
    return true;
  });
}

// ── bird physics ───────────────────────────────────────────────────
const GRAV=.34, FLAP=-7.1, SPD=1.88;
function flapBird(){
  const b=sc.bird;
  if(b.onPole){ b.onPole=false; b.vy=FLAP; showBub(0,pick(["Here I go!","THIS TIME!","FOOD!","I got this!","Watch me!"]),b.x+b.size,b.y-b.size*2.2,'r'); setTimeout(()=>hideBub(0),850); return; }
  b.vy=FLAP; b.flapT=0;
}
function updateBird_(){
  const b=sc.bird; if(b.onPole||!b.alive) return;
  if(sc.lockBird){ b.vy=0; b.angle=0; return; }
  const tf = slowMoT>0 ? slowMoF : 1;
  b.vy+=GRAV*tf; b.y+=b.vy*tf; b.x+=SPD*tf; b.flapT+=tf; b.angle=clamp(Math.atan2(b.vy,SPD*5),-1.2,1.2);
  b.blinkT++; if(b.blinkT>180&&!b.blink){b.blink=true;b.blinkT=0;} if(b.blink&&b.blinkT>8){b.blink=false;b.blinkT=0;}
  if(b.y+b.size*.5>sc.groundY){ b.y=sc.groundY-b.size*.5; b.vy=0; b.angle=0; if(gs==='playing'){ startFailScene('floor'); } }
  if(b.y<b.size*.5){b.y=b.size*.5; b.vy=Math.abs(b.vy)*.4;}
}

  cx.restore();
}

function drawOwnerArm(){
  if(!sc.ownerGrab) return;
  const t=clamp(sc.ownerGrabT,0,1);
  const hx=sc.houseX, top=sc.houseTopY, hh=sc.houseH;
  const baseX=hx-8, baseY=top+hh*.36;
  const handX=lerp(hx+28,sc.bowlX+8,t);
  const handY=lerp(baseY,sc.bowlY-6,t);
  cx.save();
  cx.strokeStyle='#0f172a'; cx.lineWidth=16; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(baseX,baseY); cx.quadraticCurveTo((baseX+handX)*.6,baseY-20,handX,handY); cx.stroke();
  cx.fillStyle='#f1c27d';
  cx.beginPath(); cx.ellipse(handX,handY,12,10,0,0,Math.PI*2); cx.fill();
  cx.restore();
}
function startBirdFall(vx=-.6, vy=-2.2, spin=.17){
  const b=sc.bird;
  b.alive=false; b.deadAnim=true; b.deadVX=vx; b.deadVY=vy; b.deadSpin=spin; b.deadFade=1;
}
function updateDeadBird(){
  const b=sc.bird; if(!b.deadAnim) return;
  const tf = slowMoT>0 ? slowMoF : 1;
  b.deadVY += .26*tf;
  b.x += b.deadVX*tf;
  b.y += b.deadVY*tf;

// ── scripted bird movement (for cinematic fails) ───────────────────
// Returns an interval that moves bird to (tx,ty) smoothly, calls cb when done
function scriptFly(tx,ty,spd,cb){
  let t=0;
  const sx=sc.bird.x, sy=sc.bird.y;
  const iv=setInterval(()=>{
    t+=spd; const tt=Math.min(t,1);
    sc.bird.x=lerp(sx,tx,eio(tt)); sc.bird.y=lerp(sy,ty,eio(tt));
    sc.bird.angle=0; sc.bird.flapT++; sc.bird.onPole=false;
    if(tt>=1){clearInterval(iv); cb();}
  },16);
  return iv;
}

// ── fail trigger detection ─────────────────────────────────────────
function checkFail(){
  if(gs!=='playing') return;
  const b=sc.bird, bowl=sc.bowl??{x:sc.bowlX,y:sc.bowlY,r:sc.bowlR};
  const dx=sc.bowlX-b.x;
  const f=nextFail();

  // Mid-flight fails (trigger early, before reaching bowl)
  if(typeof f==='string'){
    // Duck hunt: dog appears when bird is 55% across screen
    if(f==='duck_hunt' && b.x>W*.45 && !sc._failArmed){sc._failArmed=true; startFailScene('duck_hunt'); return;}
    // Wasted: mid-flight, 50% across
    if(f==='wasted' && b.x>W*.5 && !sc._failArmed){sc._failArmed=true; startFailScene('wasted'); return;}
    // Birdy Strange: bird 40% across
    if(f==='birdy_strange' && b.x>W*.4 && !sc._failArmed){sc._failArmed=true; startFailScene('birdy_strange'); return;}
    // Bowl falls: trigger when bowl is in view and bird 60% across
    if(f==='bowl_falls' && b.x>W*.6 && !sc._failArmed){sc._failArmed=true; startFailScene('bowl_falls'); return;}
    // Almost falls: bird scripted close, then bowl drops
    if(f==='almost_falls' && dx<sc.bowlR*4 && dx>0 && !sc._failArmed){sc._failArmed=true; startFailScene('almost_falls'); return;}
    // Portal butt: triggers close to bowl
    if(f==='portal_butt' && dx<sc.bowlR*3.5 && dx>0 && !sc._failArmed){sc._failArmed=true; startFailScene('portal_butt'); return;}
    // Dream: bird flies all the way to bowl
    if(f==='dream' && dx<2 && !sc._failArmed){sc._failArmed=true; startFailScene('dream'); return;}
  }

  if(typeof f==='object' && !sc._failArmed){
    if(f.t==='INVISIBLE WALL' && b.x>W*.48){ sc._failArmed=true; startFailScene('invisible_wall'); return; }
    if(f.t==='WIND GUST' && b.x>W*.36){ sc._failArmed=true; startFailScene('wind_gust'); return; }
    if(f.t==='PLANE CRASH' && b.x>W*.28){ sc._failArmed=true; startFailScene('plane_crash'); return; }
    if(f.t==='TOO SLOW' && b.x>W*.34){ sc._failArmed=true; startFailScene('too_slow'); return; }
    if(f.t==='CONNECTION LOST' && b.x>W*.32){ sc._failArmed=true; startFailScene('connection_lost'); return; }
    if(f.t==='LOW BATTERY' && b.x>W*.30){ sc._failArmed=true; startFailScene('low_battery'); return; }
    if(f.t==='BROKEN PHYSICS' && b.x>W*.33){ sc._failArmed=true; startFailScene('broken_physics'); return; }
    if(f.t==='CAT STARE' && b.x>W*.34){
      sc._failArmed=true; showFailCue('Cat stare intimidation'); sc.overlay='cat';
      setTimeout(()=>{ sc.overlay=''; startBirdFall(-.15,-1.1,.08); addShake(10,4); setTimeout(finishFailScene,720); },700);
      return;
    }
    if(f.t==='MID-AIR NAP' && b.x>W*.36){
      sc._failArmed=true; showFailCue('Mid-air nap'); sc.overlay='zzz'; sc.lockBird=true;
      setTimeout(()=>{ sc.lockBird=false; sc.overlay=''; startBirdFall(.1,-.6,.03); setTimeout(finishFailScene,760); },840);
      return;
    }
    if(f.t==='SKILL ISSUE' && b.x>W*.35){
      sc._failArmed=true; showFailCue('Skill issue'); sc.overlay='reticle';
      setTimeout(()=>{ sc.overlay=''; startBirdFall(-.4,-1.7,.2); addShake(14,6); setTimeout(finishFailScene,760); },700);
      return;
    }
  }

  // Safety fallback before bowl, never after passing bowl.
  if(b.x>W*.72 && !sc._failArmed){
    sc._failArmed=true;
    doGenericFail({t:'FALLBACK'});
  }
}

  sc.dogVis=false; sc.dogX=-170;
  sc.netVis=true; sc.netCaught=false; sc.netThrowing=true; sc.dogArmUp=false;
  shotPreset('dog');
  showBub(0,'Wait, what is that?!',sc.bird.x+sc.bird.size,sc.bird.y-sc.bird.size*2,'r');
  const dogTargetX = clamp(sc.bird.x-36, 40, W-160);
  sc.netX=-80; sc.netY=sc.bird.y-10;
  const tx=sc.bird.x+sc.bird.size*.15, ty=sc.bird.y-sc.bird.size*.1;
  sc.netVX=(tx-sc.netX)/24; sc.netVY=(ty-sc.netY)/24;
  let life=0, ended=false;
  const resolveNetFail = () => {
    if(ended) return;
    ended=true;
    sc.netThrowing=false; sc.netCaught=true; sc.dogArmUp=false;
    sc.lockBird=false;
    sc.bird.alive=false; sc.bird.deadAnim=false;

    setTimeout(()=>{ hideBub(0); showRetry('🐕','NETTED','A hunting net took him out.'); },1050);
  };
  const hardTimeout = setTimeout(resolveNetFail, 1900);
  const throwIv=setInterval(()=>{
    life++;
    sc.netX+=sc.netVX; sc.netY+=sc.netVY;
    if(life===14){
      sc.dogVis=true;
      const dogIv=setInterval(()=>{
        sc.dogX=Math.min(sc.dogX+4.6,dogTargetX);
        if(sc.dogX>=dogTargetX){ clearInterval(dogIv); sc.dogArmUp=true; }
      },16);
    }
    const dx=sc.netX-sc.bird.x, dy=sc.netY-sc.bird.y;
    if((dx*dx+dy*dy)<(sc.bird.size*sc.bird.size*.72) || life>32){
      clearInterval(throwIv); clearTimeout(hardTimeout); resolveNetFail();
    }
  },16);
}

  }
  document.getElementById('rEmoji').textContent=emoji;
  document.getElementById('rTitle').textContent=title;
  document.getElementById('rBody').textContent=body;
  document.getElementById('rScr').classList.remove('off');
  cineBarT = 0; cineFadeT = 0;
  gs='retry';
}

// ═══ MAIN LOOP ════════════════════════════════════════════════════
function loop(){
  const now = performance.now();
  const dt = now - lastFrameTs;
  lastFrameTs = now;
  frameMsAvg = lerp(frameMsAvg, dt, .06);
  qualityTier = frameMsAvg > 24 ? 'low' : frameMsAvg > 18 ? 'medium' : 'high';
  cx.clearRect(0,0,W,H);
  cx.fillStyle = sc.sky ? sc.sky[0] : '#0d0d1a';
  cx.fillRect(0,0,W,H);
  if(slowMoT>0){
    slowMoT-=16;
    if(slowMoT<=0){ slowMoT=0; slowMoF=1; }
  }
  if(camTimer>0){
    camTimer-=16;
    if(camTimer<=0){ camTX=0; camTY=0; camTZ=1; }
  }
  camX=lerp(camX,camTX,.12);
  camY=lerp(camY,camTY,.12);
  camZ=lerp(camZ,camTZ,.1);
  cx.save();
  if(shakeT>0){
    const p=shakeT/18;
    const sx=(Math.random()*2-1)*shakeAmp*p;
    const sy=(Math.random()*2-1)*shakeAmp*p;
    cx.translate(sx,sy);
    shakeT--;
    shakeAmp*=.92;
  }
  cx.translate(W*.5,H*.5);
  cx.scale(camZ,camZ);
  cx.translate(-W*.5+camX,-H*.5+camY);
  drawSky(); drawSun(); drawClouds(); drawBgBirds(); drawTrees(); drawGround();
  drawPole();
  drawHouse();
  drawOwnerArm();

  // Bowl — draw at updated position
  if(sc.bowlY<H+200) drawBowl(sc.bowlX, sc.bowlY, sc.bowlR, sc.seedCols, sc.bowlWobble);
  sc.bowlWobble*=.91;

  drawTrail();
  if((sc.bird.alive||sc.bird.onPole||sc.bird.deadAnim) && !sc.portalPOV) drawBird(sc.bird);

  // Birdy Strange (drawn on canvas)
  if(sc.bsVis) drawBirdyStrange(sc.bsX, sc.bsY, sc.bsSize, sc.bsFinger);

  drawDog();
  drawInvisibleWall();
  drawGust();
  drawPlane();
  drawPortalAndFaller();
  drawParts();
  cx.restore();
  drawPOV();
  drawSystemOverlay();
  drawFailCue();
  updateBubPos();

  if(gs==='playing'||gs==='scripted') updateBird_();
  updateDeadBird();
  if(gs==='playing') checkFail();

  // tap hint
  document.getElementById('tapHint').style.display=(gs==='playing'&&sc.bird.onPole)?'block':'none';

  tick++;
  if(sc.failCueT>0) sc.failCueT--;
  cineBar = lerp(cineBar, cineBarT, .11);
  cineFade = lerp(cineFade, cineFadeT, .1);
  if(cineBar>1){
    cx.save();
    cx.globalAlpha=.78;
    cx.fillStyle='#000';
    cx.fillRect(0,0,W,cineBar);
    cx.fillRect(0,H-cineBar,W,cineBar);
    cx.restore();
  }
  if(cineFade>.01){
    cx.save();
    const fg=cx.createRadialGradient(W*.5,H*.5,Math.min(W,H)*.15,W*.5,H*.5,Math.max(W,H)*.72);
    fg.addColorStop(0,'rgba(0,0,0,0)');
    fg.addColorStop(1,`rgba(0,0,0,${cineFade})`);
    cx.fillStyle=fg; cx.fillRect(0,0,W,H);
    cx.restore();
  }
  raf=requestAnimationFrame(loop);
}

// ═══ INPUT ═══════════════════════════════════════════════════════
function onTap(e){ e.preventDefault(); if(gs==='playing') flapBird(); }
CV.addEventListener('pointerdown',onTap,{passive:false});
document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();if(gs==='playing')flapBird();} });

// ═══ BUTTONS ═════════════════════════════════════════════════════
document.getElementById('btnGo').onclick=()=>{
  document.getElementById('tScr').classList.add('off');
  document.getElementById('hud').style.display='flex';
  document.getElementById('tapHint').style.display='block';
  startRound();
};
document.getElementById('btnRetry').onclick=()=>{
  attempts++;
  document.getElementById('attChip').textContent=`Attempt #${attempts+1}`;
  document.getElementById('rScr').classList.add('off');
  hideBub(0); hideBub(1);
  document.getElementById('wasted').classList.remove('on');
  document.getElementById('dream').classList.remove('on');
  startRound();
};

function startRound(){
  if(raf) cancelAnimationFrame(raf);
  resetCinematicState();
  failScene = null;
  lastFrameTs = performance.now();
  initScene(); gs='playing'; loop();
}

document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
