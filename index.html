<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Payne-less UI: Great Granddaddy by Dravknox Studios, home to independent software, games, music, and owned-first creative tools." />
  <meta name="author" content="Dravknox Studios" />
  <meta name="application-name" content="Payne-less UI" />
  <meta name="keywords" content="Dravknox Studios, Payne-less UI, Payne-less Typer, indie software, indie games, music studio" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#080A0F" />
  <meta name="color-scheme" content="dark light" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Payne-less UI: Great Granddaddy" />
  <meta property="og:description" content="Independent software, games, and music from Dravknox Studios." />
  <meta property="og:site_name" content="Dravknox Studios" />
  <meta property="og:image" content="assets/images/talvrek-logo.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Payne-less UI: Great Granddaddy" />
  <meta name="twitter:description" content="Independent software, games, and music from Dravknox Studios." />
  <meta name="twitter:image" content="assets/images/talvrek-logo.png" />
  <title>Payne-less UI: Great Granddaddy</title>
  <link rel="icon" href="assets/favicon/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />
  <meta name="google-site-verification" content="jhGKJWYRZEuyFaqbJzjVWFJs61J1x2RmY2Iy94k6RPU" />

  <!--
    Fonts:
    Space Grotesk — display, sharp & geometric, not fantasy
    Inter         — body text
    JetBrains Mono— background code layer
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <!-- Stylesheets: tokens first, then layout, then components, then overrides -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <!-- Hero, cards, controls (split from components.css) -->
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/controls.css" />
  <link rel="stylesheet" href="css/background.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <!-- Modal (split from modal.css) -->
  <link rel="stylesheet" href="css/modal-base.css" />
  <link rel="stylesheet" href="css/modal-projects.css" />
  <link rel="stylesheet" href="css/dropup.css" />
  <!-- Chatbot (split from chatbot.css) -->
  <link rel="stylesheet" href="css/chatbot-panel.css" />
  <link rel="stylesheet" href="css/chatbot-messages.css" />
  <link rel="stylesheet" href="css/statscard.css" />
  <!-- Info card (split from infocard.css) -->
  <link rel="stylesheet" href="css/infocard-layout.css" />
  <link rel="stylesheet" href="css/infocard-content.css" />
  <link rel="stylesheet" href="css/project-status.css" />
</head>
<body>

  <!-- Procedural background -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <div id="page">

    <!-- ════ Left sidebar: Stats ═══════════════════════ -->
    <aside id="sidebar-left">
      <!-- Hover trigger wraps button + card together -->
      <div id="stats-trigger">
        <button id="btn-stats" class="sidebar-btn" aria-label="View studio stats"
                aria-describedby="stats-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <rect x="3"  y="12" width="4" height="9" rx="1"/>
            <rect x="10" y="7"  width="4" height="14" rx="1"/>
            <rect x="17" y="3"  width="4" height="18" rx="1"/>
          </svg>
          <span>Stats</span>
        </button>

        <!-- Stats card — populated by js/statscard.js, shown on hover -->
        <div id="stats-card" role="complementary" aria-label="Studio statistics">
          <!-- Content injected by statscard.js -->
        </div>
      </div>
    </aside>

    <!-- ════ Center: Hero + Divisions ══════════════════════ -->
    <main id="center">

      <section id="hero" aria-label="Dravknox Studios">
        <div class="hero-rule" aria-hidden="true"><span class="hero-rule-dot"></span></div>

        <!--
          DRAVKNOX: Space Grotesk Bold — sharp, geometric, modern.
          No serifs, no fantasy weight. Red is a signal, not decoration.
        -->
        <h1 class="hero-name">DRAVKNOX</h1>
        <p  class="hero-suffix">STUDIOS</p>

        <div class="hero-rule" aria-hidden="true"><span class="hero-rule-dot"></span></div>

        <p class="hero-tagline">Software&nbsp;&nbsp;·&nbsp;&nbsp;Games&nbsp;&nbsp;·&nbsp;&nbsp;Music</p>
        <p class="hero-sub">Building stuff with personality that lasts.</p>
      </section>

      <!-- Division CTAs -->
      <nav id="divisions" aria-label="Studio divisions">

        <!-- Talvrek — Software (Phase 2: custom panel, not a page link) -->
        <button class="division-card" data-division="talvrek"
                data-action="open-division"
                aria-label="Talvrek — Software, Tools and Systems">
          <div class="division-logo-slot" aria-hidden="true">
            <img src="assets/images/talvrek-logo.png" alt="" />
          </div>
          <p class="division-name">Talvrek</p>
          <p class="division-label">Software</p>
          <p class="division-sub">Tools &amp; Systems</p>
        </button>

        <!-- Embrvaal — Games (Phase 2: custom panel, not a page link) -->
        <button class="division-card" data-division="embrvaal"
                data-action="open-division"
                aria-label="Embrvaal — Games, Worlds and Experiences">
          <div class="division-logo-slot" aria-hidden="true">
            <img src="assets/images/embrvaal-logo.png" alt="" />
          </div>
          <p class="division-name">Embrvaal</p>
          <p class="division-label">Games</p>
          <p class="division-sub">Worlds &amp; Experiences</p>
        </button>

        <!-- Veltrun — Music (Phase 2: custom panel, not a page link) -->
        <button class="division-card" data-division="veltrun"
                data-action="open-division"
                aria-label="Veltrun — Music, Sound and Emotion">
          <div class="division-logo-slot" aria-hidden="true">
            <img src="assets/images/veltrun-logo.png" alt="" />
          </div>
          <p class="division-name">Veltrun</p>
          <p class="division-label">Music</p>
          <p class="division-sub">Sound &amp; Emotion</p>
        </button>

        <!-- The Vault — Lore -->
        <a class="division-card" data-division="vault"
           href="vault/index.html"
           aria-label="The Vault — Lore, Secrets and Experiments">
          <!-- Vault uses an icon, not a photo logo -->
          <div class="division-logo-slot icon-slot vault-icon" aria-hidden="true">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Arch frame -->
              <path d="M10 56 L10 28 Q10 8 30 8 Q50 8 50 28 L50 56"
                    stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
              <!-- Inner arch panel -->
              <path d="M16 54 L16 30 Q16 16 30 16 Q44 16 44 30 L44 54"
                    stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"
                    stroke-linecap="round"/>
              <!-- Hinge bolts -->
              <circle cx="13" cy="32" r="1.8" fill="currentColor" opacity="0.7"/>
              <circle cx="13" cy="44" r="1.8" fill="currentColor" opacity="0.7"/>
              <circle cx="47" cy="32" r="1.8" fill="currentColor" opacity="0.7"/>
              <circle cx="47" cy="44" r="1.8" fill="currentColor" opacity="0.7"/>
              <!-- Keyhole ring -->
              <circle cx="30" cy="35" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/>
              <!-- Keyhole slot -->
              <path d="M28 40 L28 48 L32 48 L32 40"
                    stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
              <!-- Keyhole glow dot -->
              <circle cx="30" cy="35" r="2.5" fill="currentColor" opacity="0.55"/>
            </svg>
          </div>
          <p class="division-name">The Vault</p>
          <p class="division-label">Lore</p>
          <p class="division-sub">Secrets &amp; Experiments</p>
        </a>

      </nav>
    </main>

    <!-- ════ Right sidebar: Info ════════════════════════ -->
    <aside id="sidebar-right">
      <!-- Hover trigger wraps button + card together -->
      <div id="info-trigger">
        <!-- Info card — populated by js/infocard.js, shown on hover -->
        <div id="info-card" role="complementary" aria-label="Studio information">
          <!-- Content injected by infocard.js -->
        </div>

        <button id="btn-info" class="sidebar-btn" aria-label="About Dravknox Studios"
                aria-describedby="info-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <circle cx="12" cy="8" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
          <span>Info</span>
        </button>
      </div>
    </aside>

    <!-- ════ Bottom row: Controls dock ══════════════════════ -->
    <div id="bottom">
      <div id="controls" role="toolbar" aria-label="Display controls">

        <!-- Theme -->
        <button id="ctrl-theme" class="ctrl-btn"
                aria-label="Switch to light theme" aria-pressed="false"
                title="Light mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
          </svg>
          <span>Theme</span>
        </button>

        <!-- Motion -->
        <button id="ctrl-motion" class="ctrl-btn"
                aria-label="Disable animation" aria-pressed="false"
                title="Disable animation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          <span>Motion</span>
        </button>

        <div id="chat-anchor">
          <section id="chatbot-panel" aria-label="SIGIL chatbot" aria-hidden="true">
            <header class="chatbot-topbar">
              <span class="chatbot-avatar bot-avatar" aria-hidden="true">S</span>
              <span class="chatbot-title">SIGIL</span>
              <button class="chatbot-close" aria-label="Close chatbot">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </header>
            <div class="chatbot-messages" role="log" aria-live="polite" aria-relevant="additions"></div>
            <div class="chatbot-chips" aria-label="Suggested questions"></div>
            <form class="chatbot-form" autocomplete="off">
              <input id="chatbot-input" name="message" type="text"
                     aria-label="Ask SIGIL a question" placeholder="Ask SIGIL..." />
              <button class="chatbot-send" type="submit" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                  <path d="M22 2L11 13"/>
                  <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
              </button>
            </form>
          </section>

          <button id="ctrl-chatbot" class="ctrl-btn"
                  aria-label="Open chatbot" aria-expanded="false"
                  aria-controls="chatbot-panel" title="Chatbot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Chatbot</span>
          </button>
        </div>

        <!-- Contact + drop-up anchor -->
        <div id="contact-anchor">
          <!-- Drop-up list — populated by data/contacts.js + js/dropup-render.js + js/dropup-core.js -->
          <div id="contact-dropup" role="listbox" aria-label="Contact platforms">
            <div class="dropup-header">Connect</div>
            <ul class="dropup-list"></ul>
          </div>

          <button id="ctrl-contact" class="ctrl-btn"
                  aria-label="Contact Dravknox Studios"
                  aria-expanded="false"
                  aria-haspopup="listbox"
                  aria-controls="contact-dropup"
                  title="Contact">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
            <span>Contact</span>
          </button>
        </div>

      </div>
    </div>

  </div><!-- /#page -->

  <!-- ══ Division project modal ════════════════════════════════════════════
       Populated by data/projects.js + js/modal-projects.js + js/modal-core.js
  ════════════════════════════════════════════════ -->
  <div id="division-modal" role="dialog" aria-modal="true"
       aria-labelledby="modal-title">
    <div class="modal-backdrop" aria-hidden="true"></div>
    <div class="modal-panel">
      <header class="modal-header">
        <div class="modal-title-group">
          <span class="modal-division-label">Division</span>
          <h2 class="modal-title" id="modal-title">Projects</h2>
        </div>
        <button class="modal-close" aria-label="Close modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6"  x2="6"  y2="18"/>
            <line x1="6"  y1="6"  x2="18" y2="18"/>
          </svg>
        </button>
      </header>
      <div class="modal-body" role="list" aria-live="polite"></div>
      <footer class="modal-footer">
        <span class="modal-footer-note"></span>
      </footer>
    </div>
  </div>

  <!-- Load order:
       data → background (core first, layers second)
       → theme → main utilities
       → modal-projects then modal-core (render module before logic module)
       → dropup-render then dropup-core (render module before logic module)
       → chatbot → main
  -->
  <script src="data/studio.js"></script>
  <script src="data/projects.js"></script>
  <script src="data/contacts.js"></script>
  <script src="data/chatbot.js"></script>
  <!-- Background: core sets up canvas/palette/loop; layers draws the 4 streams -->
  <script src="js/bg-core.js"></script>
  <script src="js/bg-layers.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/statscard.js"></script>
  <script src="js/infocard.js"></script>
  <script src="js/project-status.js"></script>
  <!-- Modal: projects builds card HTML; core handles open/close/events -->
  <script src="js/modal-projects.js"></script>
  <script src="js/modal-core.js"></script>
  <!-- Dropup: render builds list items; core handles open/close/events -->
  <script src="js/dropup-render.js"></script>
  <script src="js/dropup-core.js"></script>
  <script src="js/chatbot.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
